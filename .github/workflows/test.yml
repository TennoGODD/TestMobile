name: Run Mobile Tests with TestIT & Allure Report

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      # На self-hosted Windows один из прошлых прогонов оставил .pytest_cache с
      # ACL, который запрещает раннеру её удалять — и об неё спотыкается checkout,
      # когда пересоздаёт workspace ("Deleting the contents ..."). Пока каталог
      # физически не удалён, checkout падает при любых настройках. Забираем
      # владельца (takeown), сбрасываем права (icacls) и сносим (rd). Всё
      # best-effort; в конце exit 0, чтобы шаг не уронил job из-за кода native-команд.
      - name: Clean leftover artifacts (self-hosted)
        shell: powershell
        run: |
          $ws = "${{ github.workspace }}"

          $pc = Join-Path $ws ".pytest_cache"
          if (Test-Path $pc) {
            cmd /c "takeown /f `"$pc`" /r /d y" | Out-Null
            cmd /c "icacls `"$pc`" /reset /t /c /q" | Out-Null
            cmd /c "rd /s /q `"$pc`"" | Out-Null
            if (Test-Path $pc) {
              Write-Host "ВНИМАНИЕ: .pytest_cache не удалилась автоматически — удалите её вручную с правами администратора на раннере."
            } else {
              Write-Host ".pytest_cache удалена."
            }
          }

          # Свои папки результатов чистим на случай, когда checkout их не трогает.
          foreach ($dir in @("allure-results", "allure-report")) {
            $path = Join-Path $ws $dir
            if (Test-Path $path) {
              Remove-Item $path -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

          exit 0

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # git clean на self-hosted падал на залоченном .pytest_cache; артефакты
          # чистим отдельным шагом выше, поэтому агрессивная зачистка не нужна.
          clean: false

      - name: Checkout gh-pages branch (for history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ./.github/gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m ensurepip --upgrade
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create connection_config.ini for TestIT
        shell: powershell
        run: |
          $content = @"
          [testit]
          url = ${{ secrets.TMS_URL }}
          projectId = ${{ secrets.TMS_PROJECT_ID }}
          adapterMode = 2
          configurationId = ${{ secrets.TMS_CONFIGURATION_ID }}
          "@
          [System.IO.File]::WriteAllText("connection_config.ini", $content, [System.Text.UTF8Encoding]::new($false))

      - name: Run pytest with TestIT and Allure
        env:
          TMS_PRIVATE_TOKEN: ${{ secrets.TMS_PRIVATE_TOKEN }}
          APPHOST: ${{ secrets.APPHOST }}
          APPPORT: ${{ secrets.APPPORT }}
          UDID: ${{ secrets.UDID }}
        run: |
          python -m pytest tests/ --testit --alluredir=allure-results -p no:cacheprovider
        continue-on-error: true

      - name: Copy history from gh-pages (if exists)
        shell: powershell
        run: |
          if (Test-Path ".\.github\gh-pages\history") {
            Copy-Item -Recurse -Force ".\.github\gh-pages\history" "allure-results\"
          } else {
            Write-Host "No existing history found, starting fresh"
          }

      - name: Create executor.json for Allure
        shell: powershell
        run: |
          $json = @{
            name       = "GitHub Actions"
            type       = "github"
            buildName  = "CI #${{ github.run_number }}"
            buildUrl   = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            reportName = "Allure Report"
          } | ConvertTo-Json
          [System.IO.File]::WriteAllText("allure-results\executor.json", $json, [System.Text.UTF8Encoding]::new($false))

      - name: Generate Allure report
        shell: powershell
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.CI_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: true