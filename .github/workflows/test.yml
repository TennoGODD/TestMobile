name: Run Mobile Tests

on:
  push:
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pytest
        env:
          APPHOST: ${{ secrets.APPHOST }}
          APPPORT: ${{ secrets.APPPORT }}
          UDID: ${{ secrets.UDID }}
        run: pytest -v