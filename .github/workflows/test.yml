name: Run Mobile Tests and Publish Allure Report

on:
  push:
    branches: [ main ]
  # или ручной запуск
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted   # твой собственный раннер
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start Appium server (background)
        run: |
          appium --log-level error &
          sleep 5  # дать время на запуск
        # или используй appium server, если он уже висит на машине

      - name: Run tests with Allure results
        run: |
          pytest --alluredir=allure-results
        continue-on-error: true   # чтобы отчёт сгенерировался даже при падениях

      - name: Generate Allure report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: ./  # или например ./report
          keep_files: false    # зачищать старые файлы